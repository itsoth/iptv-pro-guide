[build]
  publish = "."
  command = "echo 'Static site - no build required'"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/rss-*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirect old article structure to new language-specific structure
[[redirects]]
  from = "/articles/*"
  to = "/en/:splat"
  status = 301

[[redirects]]
  from = "/articles"
  to = "/blog/en/"
  status = 301

[[redirects]]
  from = "/categories/*"
  to = "/en/categories/:splat"
  status = 301

[[redirects]]
  from = "/categories"
  to = "/en/categories/"
  status = 301

[[redirects]]
  from = "/search"
  to = "/en/search.html"
  status = 301

[[redirects]]
  from = "/search.html"
  to = "/en/"
  status = 302

# Redirect old static pages
[[redirects]]
  from = "/about.html"
  to = "/en/about.html"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/en/contact.html"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to = "/en/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/terms.html"
  to = "/en/terms.html"
  status = 301

[[redirects]]
  from = "/dmca.html"
  to = "/en/dmca.html"
  status = 301

[[redirects]]
  from = "/disclaimer.html"
  to = "/en/disclaimer.html"
  status = 301

# Redirect old RSS
[[redirects]]
  from = "/rss.xml"
  to = "/rss-en.xml"
  status = 301

# 404 handling
[[redirects]]
  from = "/*"
  to = "/en/"
  status = 404
